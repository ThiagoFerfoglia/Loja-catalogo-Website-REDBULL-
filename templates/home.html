<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
</head>

<body>

{% include 'navbar.html' %}

<!-- HERO -->
<section class="hero">
    <video autoplay muted loop playsinline class="bg-video">
        <source src="{{ url_for('static', filename='videos/REDBULL.mp4') }}" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="botao_ficha">
        <a href="{{ url_for('render_static', page_name='Races') }}" class="discover-btn">
            <div class="seta"></div>
            <span class="discover-text">DISCOVER</span>
        </a>
    </div>
</section>

<section class="athlete-carousel">
    <button class="carousel-arrow left" id="prevBtn">&#10094;</button>

    <div class="carousel-content">
        <div class="carousel-text">
            <span class="carousel-tag" id="athleteSport">FÓRMULA 1</span>
            <h2 id="athleteTitle">Max Verstappen domina mais uma corrida</h2>
            <p id="athleteDesc">
                Max segue como um dos nomes mais fortes da categoria, unindo agressividade,
                técnica e consistência em alto nível.
            </p>
            <a href="{{ url_for('render_static', page_name='Races') }}" class="carousel-link" id="athleteLink">
                VEJA MAIS
                <span class="arrow-circle">&#10095;</span>
            </a>
        </div>

        <div class="carousel-image-box">
            <img id="athleteImage" src="{{ url_for('static', filename='img/maxverstappen.jpg') }}" alt="Max Verstappen">
        </div>
    </div>

    <button class="carousel-arrow right" id="nextBtn">&#10095;</button>
</section>

<!-- MEDIA SECTION -->
<section class="media-section">
    <div class="media-box">
        <div class="media-grid">

            <div class="media-card grupo-1">
                <img class="card-image" src="{{ url_for('static', filename='img/shrek.jpg') }}">
                <video class="card-video" muted loop playsinline>
                    <source src="{{ url_for('static', filename='videos/originalred.mp4') }}">
                </video>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span>RedBull</span>
                    <h2>Origin</h2>
                </div>
            </div>

            <div class="media-card grupo-2">
                <img class="card-image" src="{{ url_for('static', filename='img/shrek.jpg') }}">
                <video class="card-video" muted loop playsinline>
                    <source src="{{ url_for('static', filename='videos/sugarfree.mp4') }}">
                </video>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span>RedBull</span>
                    <h2>Sugarfree</h2>
                </div>
            </div>

            <div class="media-card grupo-1">
                <img class="card-image" src="{{ url_for('static', filename='img/shrek.jpg') }}">
                <video class="card-video" muted loop playsinline>
                    <source src="{{ url_for('static', filename='videos/corvette2.mp4') }}">
                </video>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span>Speed</span>
                    <h2>TRACK</h2>
                </div>
            </div>

            <div class="media-card grupo-2">
                <img class="card-image" src="{{ url_for('static', filename='img/shrek.jpg') }}">
                <video class="card-video" muted loop playsinline>
                    <source src="{{ url_for('static', filename='videos/corvette2.mp4') }}">
                </video>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span>Legacy</span>
                    <h2>ICON</h2>
                </div>
            </div>

        </div>
    </div>
</section>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
